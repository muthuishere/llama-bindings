# Taskfile.yml
# Orchestrates the full llama-bindings build, test, and publish lifecycle.
# Run `task --list` to see all available tasks.
#
# Upstream llama.cpp: https://github.com/ggml-org/llama.cpp
#
# Prerequisites:
#   - task (https://taskfile.dev)
#   - git, cmake, make/ninja
#   - Go >= 1.21
#   - JDK 22 + Maven
#   - Node.js >= 18 + npm
#   - Emscripten (for WASM target)

version: '3'

vars:
  LLAMA_CPP_REPO:  https://github.com/ggml-org/llama.cpp
  LLAMA_CPP_DIR:   "{{.ROOT_DIR}}/third_party/llama.cpp-src"
  BRIDGE_DIR:      "{{.ROOT_DIR}}/bridge"
  BRIDGE_BUILD:    "{{.ROOT_DIR}}/bridge/build"
  WASM_DIR:        "{{.ROOT_DIR}}/wasm"
  GO_DIR:          "{{.ROOT_DIR}}/bindings/go"
  JAVA_DIR:        "{{.ROOT_DIR}}/bindings/java"
  JS_DIR:          "{{.ROOT_DIR}}/bindings/js-browser"
  E2E_DIR:         "{{.ROOT_DIR}}/tests/e2e"
  MODELS_DIR:      "{{.ROOT_DIR}}/tests/models"
  # Models live in ~/llama-bindings-conf/models/ (outside the repo).
  # Run `task download-model` to fetch them.
  # Chat: Gemma 4 E2B Q4_K_M (~3.1 GB) — native tool-calling tokens, Apache 2.0
  # Embed: nomic-embed-text-v1.5 Q4_K_M (~80 MB) — dedicated embedding model
  CHAT_MODEL:
    sh: echo "$HOME/llama-bindings-conf/models/chat/gemma-4-E2B-it-Q4_K_M.gguf"
  EMBED_MODEL:
    sh: echo "$HOME/llama-bindings-conf/models/embeddings/nomic-embed-text-v1.5.Q4_K_M.gguf"

# ---------------------------------------------------------------------------
# Default
# ---------------------------------------------------------------------------
tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

# ---------------------------------------------------------------------------
# Init / Update
# ---------------------------------------------------------------------------
  init:
    desc: "Clone llama.cpp into third_party/llama.cpp-src and prepare workspace"
    cmds:
      - |
        if [ ! -d "{{.LLAMA_CPP_DIR}}/.git" ]; then
          git clone --depth 1 {{.LLAMA_CPP_REPO}} {{.LLAMA_CPP_DIR}}
        else
          echo "llama.cpp already cloned — run 'task update' to fetch latest."
        fi
      - mkdir -p {{.BRIDGE_BUILD}}
      - mkdir -p {{.WASM_DIR}}/build

  update:
    desc: "Pull the latest llama.cpp from https://github.com/ggml-org/llama.cpp"
    cmds:
      - git -C {{.LLAMA_CPP_DIR}} fetch --depth 1 origin
      - git -C {{.LLAMA_CPP_DIR}} reset --hard origin/HEAD

# ---------------------------------------------------------------------------
# Configure
# ---------------------------------------------------------------------------
  configure:
    desc: Configure the native bridge with CMake
    deps: [init]
    cmds:
      - |
        cmake -S {{.BRIDGE_DIR}} \
              -B {{.BRIDGE_BUILD}} \
              -DCMAKE_BUILD_TYPE=Release \
              -DLLAMA_CPP_DIR={{.LLAMA_CPP_DIR}}

# ---------------------------------------------------------------------------
# Build — llama.cpp
# ---------------------------------------------------------------------------
  build-llama:
    desc: "Build llama.cpp from https://github.com/ggml-org/llama.cpp (native)"
    deps: [init]
    cmds:
      - cmake -S {{.LLAMA_CPP_DIR}} -B {{.LLAMA_CPP_DIR}}/build -DCMAKE_BUILD_TYPE=Release -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_EXAMPLES=OFF -DGGML_METAL=OFF
      - cmake --build {{.LLAMA_CPP_DIR}}/build --config Release -j

# ---------------------------------------------------------------------------
# Build — bridge
# ---------------------------------------------------------------------------
  build-bridge:
    desc: Build the native C bridge library (libllama_bridge)
    deps: [build-llama, configure]
    cmds:
      - cmake --build {{.BRIDGE_BUILD}} --config Release -j

# ---------------------------------------------------------------------------
# Build — WASM
# ---------------------------------------------------------------------------
  build-wasm:
    desc: Compile the bridge to WebAssembly via Emscripten
    deps: [init]
    cmds:
      - |
        emcmake cmake -S {{.BRIDGE_DIR}} \
                      -B {{.WASM_DIR}}/build \
                      -DCMAKE_BUILD_TYPE=Release \
                      -DLLAMA_CPP_DIR={{.LLAMA_CPP_DIR}} \
                      -DTARGET_WASM=ON
      - cmake --build {{.WASM_DIR}}/build --config Release -j
      - cp {{.WASM_DIR}}/build/llama_bridge.js  {{.JS_DIR}}/dist/
      - cp {{.WASM_DIR}}/build/llama_bridge.wasm {{.JS_DIR}}/dist/

# ---------------------------------------------------------------------------
# Go
# ---------------------------------------------------------------------------
  build-go:
    desc: Build the Go binding
    deps: [build-bridge]
    dir: "{{.GO_DIR}}"
    cmds:
      - go build ./...

  test-go:
    desc: Run Go tests
    deps: [build-bridge]
    dir: "{{.GO_DIR}}"
    cmds:
      - go test ./... -v -count=1

  publish-go:
    desc: Tag and publish the Go module
    deps: [test-go]
    cmds:
      - |
        echo "Tagging Go release. Set GO_VERSION env var (e.g. GO_VERSION=v0.1.0)."
        : "${GO_VERSION:?GO_VERSION must be set, e.g. GO_VERSION=v0.1.0}"
        git tag "go/${GO_VERSION}"
        git push origin "go/${GO_VERSION}"
        echo "Go module published: github.com/muthuishere/llama-bindings/go@${GO_VERSION}"

# ---------------------------------------------------------------------------
# Java
# ---------------------------------------------------------------------------
  build-java:
    desc: Build the Java binding with Maven
    deps: [build-bridge]
    dir: "{{.JAVA_DIR}}"
    cmds:
      - mvn -B package -DskipTests -Dbridge.lib.dir={{.BRIDGE_BUILD}}

  test-java:
    desc: Run Java tests with Maven
    deps: [build-bridge]
    dir: "{{.JAVA_DIR}}"
    cmds:
      - mvn -B test -Dbridge.lib.dir={{.BRIDGE_BUILD}}

  publish-java:
    desc: Deploy the Java artifact to Maven repository
    deps: [test-java]
    dir: "{{.JAVA_DIR}}"
    cmds:
      - |
        echo "Deploying Java artifact. Ensure MAVEN_REPOSITORY_URL and credentials are configured."
        mvn -B deploy -Dbridge.lib.dir={{.BRIDGE_BUILD}}

# ---------------------------------------------------------------------------
# JavaScript / Browser
# ---------------------------------------------------------------------------
  build-js:
    desc: Build the browser JS package
    deps: [build-wasm]
    dir: "{{.JS_DIR}}"
    cmds:
      - npm ci
      - npm run build

  test-js:
    desc: Run JS browser binding tests (Jest, no WASM required)
    dir: "{{.JS_DIR}}"
    cmds:
      - npm ci
      - npm test

  publish-js:
    desc: Publish the JS package to npm
    deps: [test-js]
    dir: "{{.JS_DIR}}"
    cmds:
      - npm publish --access public

# ---------------------------------------------------------------------------
# Combined
# ---------------------------------------------------------------------------
  test:
    desc: Run all tests (Go + Java + JS)
    deps: [test-go, test-java, test-js]

  build:
    desc: Build all targets (bridge + Go + Java + JS)
    deps: [build-go, build-java, build-js]

# ---------------------------------------------------------------------------
# Download model
# ---------------------------------------------------------------------------
  download-model:
    desc: "Download Gemma 4 E2B (chat, ~3.1 GB) and nomic-embed-text-v1.5 (embed, ~80 MB) to ~/llama-bindings-conf/models/"
    cmds:
      - mkdir -p "$HOME/llama-bindings-conf/models/chat" "$HOME/llama-bindings-conf/models/embeddings"
      - |
        (
          if [ ! -f "$HOME/llama-bindings-conf/models/chat/gemma-4-E2B-it-Q4_K_M.gguf" ]; then
            echo "Downloading Gemma 4 E2B Q4_K_M (~3.1 GB)..."
            huggingface-cli download unsloth/gemma-4-E2B-it-GGUF gemma-4-E2B-it-Q4_K_M.gguf \
              --local-dir "$HOME/llama-bindings-conf/models/chat/"
          else
            echo "Chat model already present — skipping."
          fi
        ) &
        (
          if [ ! -f "$HOME/llama-bindings-conf/models/embeddings/nomic-embed-text-v1.5.Q4_K_M.gguf" ]; then
            echo "Downloading nomic-embed-text-v1.5 Q4_K_M (~80 MB)..."
            huggingface-cli download nomic-ai/nomic-embed-text-v1.5-GGUF nomic-embed-text-v1.5.Q4_K_M.gguf \
              --local-dir "$HOME/llama-bindings-conf/models/embeddings/"
          else
            echo "Embed model already present — skipping."
          fi
        ) &
        wait
        echo "All models ready."

# ---------------------------------------------------------------------------
# E2E tests  (require: task build-bridge && task download-model)
# ---------------------------------------------------------------------------
  e2e-go:
    desc: "Run Go e2e tests against the real Qwen2.5 model (requires build-bridge + download-model)"
    dir: "{{.E2E_DIR}}/go"
    cmds:
      - |
        LLAMA_CHAT_MODEL={{.CHAT_MODEL}} \
        LLAMA_EMBED_MODEL={{.EMBED_MODEL}} \
        go test -tags e2e ./... -v -count=1

  e2e-java:
    desc: "Run Java e2e tests against the real models (requires build-bridge + download-model)"
    dir: "{{.JAVA_DIR}}"
    cmds:
      - |
        mvn -B test -Pe2e \
            -Dbridge.lib.dir={{.BRIDGE_BUILD}} \
            -Djava.library.path={{.BRIDGE_BUILD}} \
            -DLLAMA_CHAT_MODEL={{.CHAT_MODEL}} \
            -DLLAMA_EMBED_MODEL={{.EMBED_MODEL}}

  e2e-js:
    desc: "Run Playwright browser e2e tests for the JS binding (Chromium)"
    dir: "{{.E2E_DIR}}/js-browser"
    cmds:
      - npm ci
      - npx playwright install chromium
      - npx playwright test

  e2e:
    desc: "Run all e2e tests (Go + Java + browser JS via Playwright)"
    deps: [e2e-go, e2e-java, e2e-js]

# ---------------------------------------------------------------------------
# Examples
# ---------------------------------------------------------------------------
  example-go:
    desc: "Run the Agent Team Go Gin server (NDJSON streaming) — open http://localhost:8080"
    dir: "{{.ROOT_DIR}}/examples/agent-team/go"
    cmds:
      - go mod tidy
      - |
        LLAMA_CHAT_MODEL={{.CHAT_MODEL}} \
        LLAMA_EMBED_MODEL={{.EMBED_MODEL}} \
        go run main.go

  example-java:
    desc: "Run the Agent Team Java Spring Boot server (NDJSON streaming) — open http://localhost:8081"
    dir: "{{.ROOT_DIR}}/examples/agent-team/java"
    cmds:
      - mvn -B package -q -Dbridge.lib.dir={{.BRIDGE_BUILD}}
      - |
        LLAMA_CHAT_MODEL={{.CHAT_MODEL}} \
        LLAMA_EMBED_MODEL={{.EMBED_MODEL}} \
        java -Djava.library.path={{.BRIDGE_BUILD}} \
             -jar target/agent-team-java-1.0-SNAPSHOT.jar

  example-js:
    desc: "Serve the Agent Team browser example — open http://localhost:3000/examples/agent-team/js-browser/"
    cmds:
      - echo "Serving repo root at http://localhost:3000 — open examples/agent-team/js-browser/ in your browser"
      - npx serve -l 3000 {{.ROOT_DIR}}

  example:
    desc: "Run all Agent Team examples: Go (:8080) + Java (:8081) + JS (:3000)"
    cmds:
      - task: example-go
      - task: example-java

# ---------------------------------------------------------------------------
# E2E examples (requires running servers: task example-go, task example-java, npx serve)
# ---------------------------------------------------------------------------
  e2e-examples:
    desc: "Run API + Playwright e2e tests against running example servers, output JSON report"
    dir: "{{.ROOT_DIR}}/tests/e2e"
    cmds:
      - bash run-e2e-examples.sh

  e2e-examples-go:
    desc: "Run e2e tests against Go example server only"
    dir: "{{.ROOT_DIR}}/tests/e2e"
    cmds:
      - bash run-e2e-examples.sh --skip-java --skip-js

  e2e-examples-java:
    desc: "Run e2e tests against Java example server only"
    dir: "{{.ROOT_DIR}}/tests/e2e"
    cmds:
      - bash run-e2e-examples.sh --skip-go --skip-js

  e2e-examples-js:
    desc: "Run Playwright e2e tests against JS browser example only"
    dir: "{{.ROOT_DIR}}/tests/e2e"
    cmds:
      - bash run-e2e-examples.sh --skip-go --skip-java

# ---------------------------------------------------------------------------
# Upgrade
# ---------------------------------------------------------------------------
  upgrade:
    desc: "Pull latest llama.cpp from https://github.com/ggml-org/llama.cpp and rebuild bridge"
    cmds:
      - task: update
      - task: build-bridge
      - echo "Bridge rebuilt. Run 'task test' to verify nothing regressed."
