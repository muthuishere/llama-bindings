# CI — build bridge on 4 platforms, run unit tests for Go / Java / JS
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build native bridge on each platform
  # ---------------------------------------------------------------------------
  build-bridge:
    name: Bridge (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-13,       target: darwin_amd64,  lib: libllama_bridge.dylib }
          - { os: macos-14,       target: darwin_arm64,  lib: libllama_bridge.dylib }
          - { os: ubuntu-latest,  target: linux_amd64,   lib: libllama_bridge.so    }
          - { os: windows-latest, target: windows_amd64, lib: llama_bridge.dll      }
    steps:
      - uses: actions/checkout@v4

      - name: Clone llama.cpp
        run: git clone --depth 1 https://github.com/ggml-org/llama.cpp third_party/llama.cpp-src

      - name: Build llama.cpp
        shell: bash
        run: |
          cmake -S third_party/llama.cpp-src -B third_party/llama.cpp-src/build \
            -DCMAKE_BUILD_TYPE=Release -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF -DGGML_METAL=OFF
          cmake --build third_party/llama.cpp-src/build --config Release \
            -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 4)

      - name: Build bridge
        shell: bash
        run: |
          # Determine where llama.cpp placed its shared libs (Release/ subdir on Windows)
          DYLIB_DIR="${{ github.workspace }}/third_party/llama.cpp-src/build/bin"
          if [ -d "$DYLIB_DIR/Release" ]; then
            DYLIB_DIR="$DYLIB_DIR/Release"
          fi
          mkdir -p bridge/build
          cmake -S bridge -B bridge/build -DCMAKE_BUILD_TYPE=Release \
            -DLLAMA_CPP_DIR=${{ github.workspace }}/third_party/llama.cpp-src \
            -DLLAMA_DYLIB_DIR="$DYLIB_DIR"
          cmake --build bridge/build --config Release \
            -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 4)

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-${{ matrix.target }}
          path: bridge/build/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # JS unit tests (no bridge needed — Jest uses stubs)
  # ---------------------------------------------------------------------------
  test-js:
    name: JS tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: bindings/js-browser/package-lock.json
      - run: cd bindings/js-browser && npm ci && npm test

  # ---------------------------------------------------------------------------
  # Go unit tests (needs linux bridge)
  # ---------------------------------------------------------------------------
  test-go:
    name: Go tests
    needs: build-bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: actions/download-artifact@v4
        with:
          name: bridge-linux_amd64
          path: bridge/build
      - name: Fix permissions
        run: chmod +x bridge/build/*.so 2>/dev/null || true
      - name: Run Go tests
        run: cd bindings/go && LD_LIBRARY_PATH=${{ github.workspace }}/bridge/build go test ./... -v -count=1

  # ---------------------------------------------------------------------------
  # Java unit tests (needs linux bridge)
  # ---------------------------------------------------------------------------
  test-java:
    name: Java tests
    needs: build-bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven
      - uses: actions/download-artifact@v4
        with:
          name: bridge-linux_amd64
          path: bridge/build
      - name: Fix permissions
        run: chmod +x bridge/build/*.so 2>/dev/null || true
      - name: Run Java tests
        run: cd bindings/java && mvn -B test -Dbridge.lib.dir=${{ github.workspace }}/bridge/build -Dmaven.javadoc.skip=true
